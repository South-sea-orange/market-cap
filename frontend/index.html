  <title>시가총액 순위 변화 추적</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #F5F6F8; }
    body { font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    input.rank-range {
      appearance: none;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 999px;
      outline: none;
    }
    input.rank-range::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 1px solid #D5DAE3;
      box-shadow: 0 1px 4px rgba(14,23,38,.18);
      cursor: pointer;
    }
    input.rank-range::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 1px solid #D5DAE3;
      box-shadow: 0 1px 4px rgba(14,23,38,.18);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
